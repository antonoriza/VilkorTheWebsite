# Minimalist CI/CD Pipeline for Vilkor
name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  # Build: Compiles the site
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo_extended_${HUGO_VERSION}_linux-amd64.deb

      - name: Build Hugo Site
        env:
          STATICFORMS_API_KEY: ${{ secrets.STATICFORMS_API_KEY }}
        run: hugo --minify --config config/_default/config.toml

      - name: Upload Production Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # Deploy: Final push to GitHub Pages
  deploy:
    name: 🚀 Global Deployment
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
