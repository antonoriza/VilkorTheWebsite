<div class="glass p-6 md:p-8 min-h-[280px] md:min-h-[320px] rounded-[1.5rem] md:rounded-[2rem] group hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 flex flex-col items-center justify-center text-center relative overflow-hidden">
    <div class="w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl bg-[{{ .color }}]/10 flex items-center justify-center text-[{{ .color }}] mb-4 md:mb-6 group-hover:scale-110 transition-transform shadow-inner">
        <span class="material-symbols-outlined text-2xl md:text-3xl" style="font-variation-settings: 'FILL' 0;">{{ .icon }}</span>
    </div>
    <h4 class="font-bold text-xl md:text-[22px] text-on-background dark:text-white mb-1">{{ T .title }}</h4>
    <p class="font-body-md text-sm md:text-base text-on-surface-variant dark:text-white/60 leading-relaxed">{{ T .desc }}</p>
</div>
