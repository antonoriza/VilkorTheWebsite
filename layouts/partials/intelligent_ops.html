<section class="w-full pt-4 md:pt-8 pb-12 md:pb-20 relative overflow-hidden" data-aos="fade-up">

    </div>




    <div class="max-w-container-max mx-auto px-6 md:px-gutter relative z-10">


    <div class="flex flex-col lg:flex-row items-center gap-12 md:gap-gutter relative z-10">

                    <img class="absolute inset-0 w-full h-full object-cover rounded-xl group-hover:scale-105 transition-transform duration-700 opacity-90 group-hover:opacity-100 will-change-transform" 
                         alt="Intelligent Operations"

                </div>
            </div>
        </div>

        <!-- Content Column -->
        <div class="lg:w-1/2 flex flex-col gap-4 md:gap-base order-1 lg:order-2">
            <div class="inline-flex items-center gap-xs text-tertiary mb-2" data-aos="fade-left" data-aos-delay="300">
                <div class="w-9 h-9 md:w-10 md:h-10 rounded-xl bg-tertiary/10 flex items-center justify-center glass shadow-inner mb-2 flex-shrink-0 animate-pulse will-change-opacity">
                    <span class="material-symbols-outlined text-[20px] md:text-[24px]" style="font-variation-settings: 'FILL' 1;">verified</span>
                </div>
                <span class="font-label-sm font-bold text-[10px] md:text-label-sm uppercase tracking-[0.2em] ml-2 text-tertiary">{{ T "ai_automation_title" }}</span>
            </div>
            
            <h2 class="font-h2 font-bold text-3xl md:text-[42px] text-on-background dark:text-white mb-4 md:mb-6 leading-[1.1] tracking-tight" data-aos="fade-left" data-aos-delay="400">
                {{ T "intelligent_operations" }}
            </h2>
            
            <div class="relative" data-aos="fade-left" data-aos-delay="500">
                {{ T "intelligent_ops_desc" | safeHTML }}
            </div>
        </div>
    </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('nodes-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height, particles;
        const particleCount = 100; // More particles
        const connectionDistance = 180; // Larger connection range
        const mouse = { x: null, y: null };


        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 3 + 2; // Larger particles
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#8b5cf6'; // Sophisticated Violet (Tertiary)
                ctx.fill();
            }

        }


        function init() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
            particles = Array.from({ length: particleCount }, () => new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            const color = '#8b5cf6'; // Sophisticated Violet
            
            particles.forEach((p, i) => {

                p.update();
                p.draw();

                // Connect to mouse
                if (mouse.x !== null) {
                    const dx = p.x - mouse.x;
                    const dy = p.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < connectionDistance * 1.8) {
                        ctx.beginPath();
                        ctx.strokeStyle = color;
                        ctx.globalAlpha = 1 - (dist / (connectionDistance * 1.8));
                        ctx.lineWidth = 1; // Thicker lines
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }

                // Connect to other particles
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = color;
                        ctx.globalAlpha = 0.5 - (dist / connectionDistance) * 0.5;
                        ctx.lineWidth = 0.8; // Thicker lines
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(animate);
        }


        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('resize', init);
        init();
        animate();
    });
</script>

<style>
    .will-change-transform { will-change: transform; }
    .will-change-opacity { will-change: opacity; }
    @keyframes scanline {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(1000%); }
    }
    .animate-scanline { animation: scanline 8s linear infinite; }
</style>
