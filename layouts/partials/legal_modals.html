<!-- 9) Terms & Conditions Modal -->
<div id="terms-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-6">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="toggleTermsModal()"></div>
    
    <!-- Modal Card -->
    <div class="glass relative w-full max-w-2xl max-h-[85vh] flex flex-col bg-white dark:bg-zinc-950 rounded-[2.5rem] border border-white/20 shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="terms-card">
        <!-- Header -->
        <div class="p-8 border-b border-on-background/10 dark:border-white/10 flex items-center justify-between bg-white/5">
            <h2 class="font-h3 text-xl font-bold dark:text-white">{{ T "terms_title" }}</h2>
            <button onclick="toggleTermsModal()" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-on-background dark:text-white">close</span>
            </button>
        </div>
        
        <!-- Content Area (Scrollable) -->
        <div class="p-8 overflow-y-auto custom-scrollbar bg-white dark:bg-transparent">
            {{ T "terms_content" | safeHTML }}
        </div>
        
        <!-- Footer -->
        <div class="p-8 border-t border-on-background/10 dark:border-white/10 text-center bg-white/5">
            <button onclick="toggleTermsModal()" class="px-8 py-3 bg-[#34d399] text-[#002114] font-bold rounded-full hover:shadow-lg transition-all">
                {{ T "understood" }}
            </button>
        </div>
    </div>
</div>

<style>
/* Custom Scrollbar for the Terms Modal */
.custom-scrollbar::-webkit-scrollbar {
    width: 6px;
}
.custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
}
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(52, 211, 153, 0.2);
    border-radius: 10px;
}
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(52, 211, 153, 0.4);
}
</style>

<!-- 10) Privacy Policy Modal -->
<div id="privacy-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-6">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="togglePrivacyModal()"></div>
    
    <!-- Modal Card -->
    <div class="glass relative w-full max-w-2xl max-h-[85vh] flex flex-col bg-white dark:bg-zinc-950 rounded-[2.5rem] border border-white/20 shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300" id="privacy-card">
        <!-- Header -->
        <div class="p-8 border-b border-on-background/10 dark:border-white/10 flex items-center justify-between bg-white/5">
            <h2 class="font-h3 text-xl font-bold dark:text-white">{{ T "privacy_title" }}</h2>
            <button onclick="togglePrivacyModal()" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-on-background dark:text-white">close</span>
            </button>
        </div>
        
        <!-- Content Area (Scrollable) -->
        <div class="p-8 overflow-y-auto custom-scrollbar bg-white dark:bg-transparent">
            {{ T "privacy_content" | safeHTML }}
        </div>
        
        <!-- Footer -->
        <div class="p-8 border-t border-on-background/10 dark:border-white/10 text-center bg-white/5">
            <button onclick="togglePrivacyModal()" class="px-8 py-3 bg-[#34d399] text-[#002114] font-bold rounded-full hover:shadow-lg transition-all">
                {{ T "understood" }}
            </button>
        </div>
    </div>
</div>

<script>
function toggleTermsModal() {
    const modal = document.getElementById('terms-modal');
    const card = document.getElementById('terms-card');
    const isHidden = modal.classList.contains('hidden');
    
    if (isHidden) {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            card.classList.remove('scale-95');
            card.classList.add('scale-100');
        }, 10);
    } else {
        modal.classList.add('opacity-0');
        card.classList.remove('scale-100');
        card.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }, 300);
    }
}

function togglePrivacyModal() {
    const modal = document.getElementById('privacy-modal');
    const card = document.getElementById('privacy-card');
    const isHidden = modal.classList.contains('hidden');
    
    if (isHidden) {
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            card.classList.remove('scale-95');
            card.classList.add('scale-100');
        }, 10);
    } else {
        modal.classList.add('opacity-0');
        card.classList.remove('scale-100');
        card.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            document.body.style.overflow = '';
        }, 300);
    }
}
