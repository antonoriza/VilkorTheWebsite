<!DOCTYPE html>
<html lang="{{ .Lang }}" class="overflow-x-hidden">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ T "site_description" }}"/>
    <link rel="canonical" href="{{ .Permalink }}"/>

    <!-- Open Graph / SEO -->
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="{{ .Permalink }}"/>
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}"/>
    <meta property="og:description" content="{{ T "site_description" }}"/>
    <meta property="og:image" content="{{ .Site.BaseURL }}images/og-image.png"/>
    <meta name="twitter:card" content="summary_large_image"/>
    <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}"/>
    <meta name="twitter:description" content="{{ T "site_description" }}"/>
    <meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-image.png"/>
    
    <!-- Cache Control: Force freshness on every load -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Critical Performance Assets -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    {{ $style := resources.Get "css/main.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}" integrity="{{ $style.Data.Integrity }}">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "var(--color-on-background)",
                        "primary": "var(--color-primary)",
                        "secondary": "var(--color-secondary)",
                        "tertiary": "var(--color-tertiary)",
                        "warning": "var(--color-warning)",
                        "surface": "#fafaf1",
                        "primary-container": "var(--color-primary-container)",
                        "on-surface": "#1a1c17",
                        "on-surface-variant": "#44493f",
                        "surface-container-high": "#e2e3d8",
                    },
                    spacing: {
                        "gutter": "32px",
                        "base": "8px",
                        "container-max": "1280px",
                    },
                    fontFamily: {
                        "h1": ["Manrope"],
                        "h2": ["Manrope"],
                        "body": ["Inter"],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background dark:bg-[#0a0a0a] dark:text-gray-100 antialiased selection:bg-primary-container transition-colors duration-500 overflow-x-hidden">
    <!-- Scroll Progress Bar -->
    <div id="scroll-progress" class="fixed top-0 left-0 h-[3px] bg-gradient-to-r from-primary-container to-[#34d399] z-[1000] w-0 transition-all duration-150 ease-out shadow-[0_0_10px_rgba(52,211,153,0.5)]"></div>


    {{ partial "nav.html" . }}

    <main class="pt-[100px]">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <!-- Performance Optimized Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Theme Management
        const html = document.documentElement;
        const setInitialTheme = () => {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') html.classList.add('dark');
            else html.classList.remove('dark');
        };
        setInitialTheme();
        
        // Scroll Progress Logic
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("scroll-progress").style.width = scrolled + "%";
        }, { passive: true });

        document.addEventListener('DOMContentLoaded', () => {
            // AOS Init
            AOS.init({
                duration: 800,
                once: true,
                easing: 'ease-out-quart',
                offset: 50,
                disable: 'mobile' // Disable on mobile for performance if needed
            });

            // Optimized Dark Mode Toggle with Animation
            const toggle = document.getElementById('dark-mode-toggle');
            if (toggle) {
                toggle.addEventListener('click', () => {
                    const icon = toggle.querySelector('.material-symbols-outlined:not(.hidden)');
                    icon.style.transform = 'rotate(360deg) scale(0)';
                    icon.style.opacity = '0';
                    
                    setTimeout(() => {
                        html.classList.toggle('dark');
                        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
                        
                        const newIcon = toggle.querySelector('.material-symbols-outlined:not(.hidden)');
                        newIcon.style.transform = 'rotate(-360deg) scale(0)';
                        newIcon.style.opacity = '0';
                        
                        requestAnimationFrame(() => {
                            newIcon.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            newIcon.style.transform = 'rotate(0deg) scale(1)';
                            newIcon.style.opacity = '1';
                        });
                    }, 250);
                });
            }
            
            // Hero Parallax Logic
            const heroImage = document.getElementById('hero-image');
            if (heroImage) {
                window.addEventListener('scroll', () => {
                    const scrolled = window.pageYOffset;
                    if (scrolled < 1000) {
                        heroImage.style.transform = `translateY(${scrolled * 0.1}px)`;
                    }
                }, { passive: true });
            }

            // High-Performance 3D Tilt (Optimized & Leak-Free)
            const cards = document.querySelectorAll('.pricing-card');
            if (cards.length > 0) {
                const tiltObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const card = entry.target;
                        if (entry.isIntersecting) {
                            let frame;
                            const handleMove = (e) => {
                                if (frame) cancelAnimationFrame(frame);
                                frame = requestAnimationFrame(() => {
                                    const rect = card.getBoundingClientRect();
                                    const x = e.clientX - rect.left;
                                    const y = e.clientY - rect.top;
                                    const rotateX = (y - (rect.height / 2)) / 15;
                                    const rotateY = ((rect.width / 2) - x) / 15;
                                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                                });
                            };
                            const handleLeave = () => {
                                cancelAnimationFrame(frame);
                                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                            };
                            card.addEventListener('mousemove', handleMove, { passive: true });
                            card.addEventListener('mouseleave', handleLeave);
                            card._tiltHandlers = { handleMove, handleLeave };
                        } else if (card._tiltHandlers) {
                            card.removeEventListener('mousemove', card._tiltHandlers.handleMove);
                            card.removeEventListener('mouseleave', card._tiltHandlers.handleLeave);
                        }
                    });
                }, { threshold: 0.1 });

                cards.forEach(card => tiltObserver.observe(card));
            }
        });
    </script>
    {{ partial "cookie_banner.html" . }}
    

</body>
</html>
