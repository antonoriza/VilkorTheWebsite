<section id="why-vilkor" class="py-12 md:py-20 px-6 md:px-8 bg-on-background/5 dark:bg-zinc-950 scroll-mt-24 relative overflow-hidden">
    <!-- Interactive Topographic Mesh Background -->
    <div class="absolute inset-0 pointer-events-none z-0 opacity-40 dark:opacity-30">
        <canvas id="topographic-canvas" class="w-full h-full"></canvas>
    </div>

    <div class="max-w-container-max mx-auto relative z-10">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">
            <div class="space-y-6 md:space-y-8 text-center lg:text-left" data-aos="fade-right">
                <div class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-[#8b5cf6]/10 border border-[#8b5cf6]/20 text-[#8b5cf6] font-bold text-[10px] md:text-[11px] uppercase tracking-[0.2em] mx-auto lg:mx-0">
                    <span class="w-2 h-2 bg-[#8b5cf6] rounded-full animate-pulse"></span>
                    {{ T "why_vilkor" }}
                </div>
                <h2 class="font-h1 font-bold text-3xl md:text-4xl lg:text-5xl text-on-background dark:text-white leading-tight tracking-tight">
                    {{ T "why_vilkor" }}
                </h2>
                <div class="font-body-lg text-lg md:text-xl text-on-surface-variant dark:text-gray-400 space-y-6 max-w-xl mx-auto lg:mx-0 leading-relaxed italic border-l-4 border-tertiary pl-6">
                    {{ T "why_vilkor_subtitle" }}

                <div class="pt-4 md:pt-6 flex justify-center lg:justify-start">
                    <a href="#book-a-demo" class="group relative px-8 py-4 rounded-full overflow-hidden transition-all duration-300 hover:scale-105 active:scale-95 flex items-center gap-3">
                        <!-- Glass Background -->
                        <div class="absolute inset-0 bg-tertiary/5 group-hover:bg-tertiary/10 backdrop-blur-md transition-colors"></div>
                        <div class="absolute inset-0 border border-tertiary/20 group-hover:border-tertiary/40 rounded-full transition-colors"></div>
                        
                        <span class="relative z-10 font-bold text-on-background dark:text-white flex items-center gap-2">
                            {{ T "start_operating" }}
                            <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>

            </div>
            
            <div class="relative mt-8 lg:mt-0" data-aos="fade-left">
                <div class="absolute -inset-10 bg-[#8b5cf6]/10 blur-[80px] rounded-full opacity-40"></div>
                <div class="glass rounded-[2rem] md:rounded-[3rem] border border-white/40 dark:border-white/10 overflow-hidden shadow-2xl relative z-10 transform lg:hover:scale-105 transition-transform duration-700 aspect-square sm:aspect-video lg:aspect-square">
                    <img alt="{{ T "why_vilkor" }}" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuvOzxZ6julUV_plZ0u-hW-JCi28sy3GKQxGDtYirQAlgD_EqTrRzKvsXcle_P04ZArXftsqKTvma0jZLsK8X6YFS926lnbMPIVDr_C6A3X_QKEnEr1ZdW82fiPW23D5k45oqra4UmyRwYRTW3Ndhfx3mq4R4dxilBDp-V6eZPAzJtwO3k-n_fh0WsN--QqUycd6ntJ4gqeDA9EgsqMeY902ciXsf2sSOzK-RbAQCaL7YMrF8wGX9_gO3V4AZunyETzQWODTcVj-01" />
                    <div class="absolute inset-0 bg-gradient-to-tr from-[#8b5cf6]/20 to-transparent"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('topographic-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height;
        const mouse = { x: -1000, y: -1000, targetX: -1000, targetY: -1000 };
        let time = 0;

        function init() {
            width = canvas.width = canvas.parentElement.offsetWidth;
            height = canvas.height = canvas.parentElement.offsetHeight;
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            time += 0.015;
            
            // Check for dark mode
            const isDark = document.documentElement.classList.contains('dark');
            
            // Smooth mouse
            mouse.x += (mouse.targetX - mouse.x) * 0.1;
            mouse.y += (mouse.targetY - mouse.y) * 0.1;

            const rows = 28;
            const cols = 28;
            const xGap = width / cols;
            const yGap = height / rows;

            // Reactive color: Solid blue for light, brighter blue for dark
            ctx.strokeStyle = isDark ? '#4fa3ff' : '#0058be'; 
            ctx.lineWidth = isDark ? 1.2 : 1.0; // Bolder lines

            // Draw horizontal lines
            for (let j = 0; j <= rows; j++) {
                ctx.beginPath();
                for (let i = 0; i <= cols; i++) {
                    const x = i * xGap;
                    const y = j * yGap;
                    
                    // Topography calculation (Wave + Mouse)
                    const noise = Math.sin(i * 0.3 + time) * Math.cos(j * 0.3 + time) * 25;
                    
                    const dx = mouse.x - x;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const influence = Math.max(0, 1 - dist / 350);
                    const lift = influence * influence * 120; // Stronger lift
                    
                    const finalY = y + noise - lift;
                    
                    if (i === 0) ctx.moveTo(x, finalY);
                    else ctx.lineTo(x, finalY);
                }
                ctx.globalAlpha = 0.15 + (j / rows) * 0.25; // Stronger alpha
                ctx.stroke();
            }

            // Draw vertical lines
            for (let i = 0; i <= cols; i++) {
                ctx.beginPath();
                for (let j = 0; j <= rows; j++) {
                    const x = i * xGap;
                    const y = j * yGap;
                    
                    const noise = Math.sin(i * 0.3 + time) * Math.cos(j * 0.3 + time) * 25;
                    const dx = mouse.x - x;
                    const dy = mouse.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const influence = Math.max(0, 1 - dist / 350);
                    const lift = influence * influence * 120; // Stronger lift
                    
                    const finalY = y + noise - lift;
                    
                    if (j === 0) ctx.moveTo(x, finalY);
                    else ctx.lineTo(x, finalY);
                }
                ctx.globalAlpha = 0.15 + (i / cols) * 0.25; // Stronger alpha
                ctx.stroke();
            }


            requestAnimationFrame(draw);
        }

        window.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.targetX = e.clientX - rect.left;
            mouse.targetY = e.clientY - rect.top;
        });

        window.addEventListener('resize', init);
        init();
        draw();
    });
</script>
