[terms_content]
other = " <div class='space-y-8 text-on-surface-variant dark:text-white/70 text-sm leading-relaxed'> <p class='text-xs uppercase tracking-widest opacity-60 dark:text-white/80'>Last Updated: May 2, 2026</p> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>1. Payment Processing and Commissions</h4> <p>Payment services in Vilkor are conducted through <strong>Stripe's</strong> infrastructure.</p> <ul class='list-disc pl-5 mt-2 space-y-1'> <li><strong>Commissions:</strong> The User agrees that using the payment gateway entails commissions depending on Stripe's current policies. Vilkor reserves the right to apply additional service charges, which will be itemized at the time of the transaction.</li> <li><strong>Financial Independence:</strong> Vilkor does not hold funds or intervene in the settlement process. Clarifications regarding transfers must be managed via Stripe or your banking institution.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>2. Conduct and Coexistence</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Acceptable Use:</strong> Use of offensive, discriminatory, or violent language in any platform module is strictly prohibited.</li> <li><strong>Interaction Disclaimer:</strong> Vilkor is a technological facilitator. We do not monitor private communications and are disclaimed from liabilities arising from conflicts between residents, staff, or administrators.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>3. Data Management and Storage</h4> <p>Vilkor allows document uploads and file management under an <strong>administrative storage</strong> scheme subject to our cloud infrastructure provider's limits. The User is prohibited from using the platform as a general storage service for personal files, photos, or video.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>4. Service Termination</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Grace Period:</strong> Upon cancellation, the Administrator will have <strong>30 calendar days</strong> to export their information.</li> <li><strong>Deletion:</strong> After this period, Vilkor will permanently delete the data to ensure privacy and system optimization.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>5. AI and Support Disclaimer (SLA)</h4> <p>The use of <strong>AI</strong> agents is for informational purposes. Final decisions are the responsibility of the Human User. Technical availability is governed exclusively by our cloud provider's SLA.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>6. Governing Law and Jurisdiction</h4> <p>This contract is governed by the laws of <strong>Mexico</strong>. Any disputes shall be resolved in the competent courts of Mexico City / State of Mexico.</p> </section> </div>"

