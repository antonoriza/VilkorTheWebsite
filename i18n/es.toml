[ai_automation_desc]
other = """
<div class="space-y-6">
    <p class="font-body-lg text-on-surface-variant dark:text-gray-400 max-w-2xl leading-relaxed mb-8">
        Optimice su operación con un ecosistema diseñado para la transparencia absoluta, elevado para aumentar el valor patrimonial y la confianza de los residentes.
    </p>

    <!-- Tab System (CSS Based) -->
    <div class="relative w-full max-w-2xl">
        <input type="radio" id="tab-admin" name="card-tabs" class="hidden peer/admin" checked>
        <input type="radio" id="tab-resident" name="card-tabs" class="hidden peer/resident">

        <!-- Tab Headers -->
        <div class="flex p-1 bg-on-background/5 dark:bg-white/5 rounded-xl border border-on-background/10 dark:border-white/10 mb-8 w-fit">
            <label for="tab-admin" class="px-6 py-2 rounded-lg text-[12px] font-bold uppercase tracking-wider cursor-pointer transition-all duration-300 hover:opacity-80 peer-checked/admin:bg-[#674bb5] peer-checked/admin:text-white">Para la Administradora</label>
            <label for="tab-resident" class="px-6 py-2 rounded-lg text-[12px] font-bold uppercase tracking-wider cursor-pointer transition-all duration-300 hover:opacity-80 peer-checked/resident:bg-[#674bb5] peer-checked/resident:text-white">Para el Residente</label>
        </div>

        <!-- Admin Content -->
        <div class="hidden peer-checked/admin:block animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">hub</span>
                    <h4 class="font-bold text-sm dark:text-white">Escalabilidad Operativa</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Estandarice procesos y gestione múltiples carteras con una infraestructura ligera.</p>
                </div>
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">account_balance</span>
                    <h4 class="font-bold text-sm dark:text-white">Rigor de Auditoría</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Reportes financieros íntegros y listos para rendición de cuentas, sin discrepancias.</p>
                </div>
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">verified_user</span>
                    <h4 class="font-bold text-sm dark:text-white">Blindaje de Reputación</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Proyecte profesionalismo mediante trazabilidad total en cada transacción.</p>
                </div>
            </div>
        </div>

        <!-- Resident Content -->
        <div class="hidden peer-checked/resident:block animate-fade-in">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">visibility</span>
                    <h4 class="font-bold text-sm dark:text-white">Transparencia Total</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Acceso inmediato a estados de cuenta, reglamentos y evidencia de gestión financiera.</p>
                </div>
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">phonelink_setup</span>
                    <h4 class="font-bold text-sm dark:text-white">Certeza Operativa</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Canal directo para trámites, reportes y seguimiento formal de solicitudes con respuestas oportunas.</p>
                </div>
                <div class="space-y-3">
                    <span class="material-symbols-outlined text-[#674bb5] text-2xl">trending_up</span>
                    <h4 class="font-bold text-sm dark:text-white">Plusvalía Tecnológica</h4>
                    <p class="text-[12px] opacity-70 leading-relaxed">Una comunidad organizada aumenta el valor real de su propiedad.</p>
                </div>
            </div>
        </div>
    </div>
</div>
"""

