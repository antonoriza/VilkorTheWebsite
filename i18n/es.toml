other = " <div class='space-y-8 text-on-surface-variant dark:text-white/70 text-sm leading-relaxed'> <p class='text-xs uppercase tracking-widest opacity-60 dark:text-white/80'>Última actualización: 2 de mayo de 2026</p> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>1. Procesamiento de Pagos y Comisiones</h4> <p>El servicio de pagos en Vilkor se realiza a través de la infraestructura de <strong>Stripe</strong>.</p> <ul class='list-disc pl-5 mt-2 space-y-1'> <li><strong>Comisiones:</strong> El Usuario acepta que el uso de la pasarela de pagos conlleva comisiones que dependen de las políticas vigentes de Stripe. Vilkor se reserva el derecho de aplicar cargos por servicio adicionales desglosados al momento de la transacción.</li> <li><strong>Independencia Financiera:</strong> Vilkor no retiene fondos ni interviene en el proceso de liquidación. Aclaraciones sobre transferencias deben gestionarse vía Stripe o su institución bancaria.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>2. Conducta y Convivencia</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Uso Aceptable:</strong> Queda estrictamente prohibido el uso de lenguaje ofensivo, discriminatorio o violento en cualquier módulo de la plataforma.</li> <li><strong>Deslinde de Interacción:</strong> Vilkor es un facilitador tecnológico. No supervisamos comunicaciones privadas y nos deslindamos de responsabilidades derivadas de conflictos entre residentes, staff o administradores.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>3. Gestión de Datos y Almacenamiento</h4> <p>Vilkor permite la carga de documentos y gestión de archivos bajo un esquema de <strong>almacenamiento administrativo limitado</strong> sujeto a los límites de nuestro proveedor de infraestructura cloud. El Usuario tiene prohibido el uso de la plataforma como servicio de almacenamiento general de archivos personales, fotos o video.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>4. Terminación del Servicio</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Periodo de Gracia:</strong> Tras la cancelación, el Administrador tendrá <strong>30 días naturales</strong> para exportar su información.</li> <li><strong>Eliminación:</strong> Transcurrido dicho plazo, Vilkor eliminará definitivamente los datos para garantizar la privacidad y optimización del sistema.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>5. Deslinde de IA y Soporte (SLA)</h4> <p>El uso de agentes de <strong>IA</strong> es de carácter informativo. Las decisiones finales son responsabilidad del Usuario Humano. La disponibilidad técnica se rige exclusivamente por el SLA de nuestro proveedor de nube.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>6. Ley Aplicable y Jurisdicción</h4> <p>Este contrato se rige por las leyes de <strong>México</strong>. Cualquier disputa será resuelta en los tribunales competentes de la Ciudad de México / Estado de México.</p> </section> </div>"

[privacy_title]
other = "Aviso de Privacidad Integral – Vilkor PMS"

[privacy_content]
other = " <div class='space-y-8 text-on-surface-variant dark:text-white/70 text-sm leading-relaxed'> <p class='text-xs uppercase tracking-widest opacity-60 dark:text-white/80'>Última actualización: 2 de mayo de 2026</p> <p>En cumplimiento con la <strong>Ley Federal de Protección de Datos Personales en Posesión de los Particulares (LFPDPPP)</strong>, se pone a su disposición el presente Aviso de Privacidad Integral.</p> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>1. Identidad y Domicilio</h4> <p>El responsable del tratamiento de sus datos personales es el equipo de <strong>Vilkor</strong>. Contacto: <a href='mailto:legal@vilkor.xyz' class='text-[#34d399] underline'>legal@vilkor.xyz</a>.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>2. Datos Personales Recabados</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Identificación:</strong> Nombre completo, fotografía (opcional) y rol.</li> <li><strong>Contacto:</strong> Correo electrónico, teléfono y unidad/departmento.</li> <li><strong>Financieros:</strong> Procesados directamente por <strong>Stripe</strong>.</li> <li><strong>Uso:</strong> Registros de acceso, logs e interacciones con agentes de IA.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>3. Finalidades del Tratamiento</h4> <ul class='list-disc pl-5 space-y-1'> <li>Gestionar el control de acceso y administración.</li> <li>Facilitar comunicación interna (Residentes, Staff, Admins).</li> <li>Procesar pagos automatizados vía Stripe.</li> <li>Optimizar la gestión operativa mediante Inteligencia Artificial.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>4. Transferencia de Datos</h4> <p>Sus datos pueden ser transferidos a terceros únicamente para la ejecución de transacciones financieras (Stripe), alojamiento en infraestructura segura (Cloud) o por requerimiento de autoridades competentes.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>5. Derechos ARCO</h4> <p>Usted tiene derecho al <strong>Acceso, Rectificación, Cancelación u Oposición</strong> de sus datos. Envíe su solicitud a <a href='mailto:legal@vilkor.xyz' class='text-[#34d399] underline'>legal@vilkor.xyz</a> con identificación oficial digitalizada.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>6. Consentimiento para uso de IA</h4> <p>Al utilizar Vilkor, el usuario consiente el procesamiento de información operativa por modelos de lenguaje para generar resúmenes, reportes y automatizaciones.</p> </section> </div>"

