[terms_title]
other = "Termos e Condições de Uso – Vilkor PMS"

[terms_content]
other = " <div class='space-y-8 text-on-surface-variant dark:text-white/70 text-sm leading-relaxed'> <p class='text-xs uppercase tracking-widest opacity-60 dark:text-white/80'>Última atualização: 2 de maio de 2026</p> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>1. Processamento de Pagamentos e Comissões</h4> <p>Os serviços de pagamento no Vilkor são realizados através da infraestrutura da <strong>Stripe</strong>.</p> <ul class='list-disc pl-5 mt-2 space-y-1'> <li><strong>Comissões:</strong> O Usuário aceita que o uso do gateway de pagamento acarreta comissões que dependem das políticas vigentes da Stripe. O Vilkor reserva-se o direito de aplicar taxas de serviço adicionais, que serão detalhadas no momento da transação.</li> <li><strong>Independência Financeira:</strong> O Vilkor não retém fundos nem intervém no processo de liquidação. Esclarecimentos sobre transferências devem ser geridos via Stripe ou sua instituição bancária.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>2. Conduta e Convivência</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Uso Aceitável:</strong> É estritamente proibido o uso de linguagem ofensiva, discriminatória ou violenta em qualquer módulo da plataforma.</li> <li><strong>Isenção de Interação:</strong> O Vilkor é um facilitador tecnológico. Não monitoramos comunicações privadas e nos isentamos de responsabilidades derivadas de conflitos entre residentes, funcionários ou administradores.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>3. Gestão de Dados e Armazenamento</h4> <p>O Vilkor permite o upload de documentos e gestão de arquivos sob um esquema de <strong>armazenamento dinâmico</strong> sujeito aos limites do nosso provedor de infraestrutura em nuvem. O Usuário é responsável por manter backups externos de documentação crítica.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>4. Rescisão do Serviço</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Período de Graça:</strong> Após o cancelamento, o Administrador terá <strong>30 dias corridos</strong> para exportar suas informações.</li> <li><strong>Exclusão:</strong> Decorrido este prazo, o Vilkor excluirá definitivamente os dados para garantir a privacidade e otimização do sistema.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>5. Isenção de Responsabilidade de IA e Suporte (SLA)</h4> <p>O uso de agentes de <strong>IA</strong> é de caráter informativo. As decisões finais são de responsabilidade do Usuário Humano. A disponibilidade técnica é regida exclusivamente pelo SLA do nosso provedor de nuvem.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>6. Lei Aplicável e Jurisdição</h4> <p>Este contrato é regido pelas leis do <strong>México</strong> (País de Origem). Quaisquer disputas serão resolvidas nos tribunais competentes da Cidade do México.</p> </section> </div>"

[privacy_title]
other = "Aviso de Privacidade Integral – Vilkor PMS"

[privacy_content]
other = " <div class='space-y-8 text-on-surface-variant dark:text-white/70 text-sm leading-relaxed'> <p class='text-xs uppercase tracking-widest opacity-60 dark:text-white/80'>Última atualização: 2 de maio de 2026</p> <p>Em conformidade com a <strong>LGPD (Lei Geral de Proteção de Dados)</strong> e padrões internacionais, este Aviso de Privacidade Integral é disponibilizado a você.</p> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>1. Identidade e Domicílio</h4> <p>A entidade responsável pelo tratamento dos seus dados pessoais é a equipe do <strong>Vilkor</strong>. Contato: <a href='mailto:legal@vilkor.xyz' class='text-[#34d399] underline'>legal@vilkor.xyz</a>.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>2. Dados Pessoais Coletados</h4> <ul class='list-disc pl-5 space-y-1'> <li><strong>Identificação:</strong> Nome completo, fotografia (opcional) e função.</li> <li><strong>Contato:</strong> Endereço de e-mail, telefone e unidade/departamento.</li> <li><strong>Financeiros:</strong> Processados diretamente pela <strong>Stripe</strong>.</li> <li><strong>Uso:</strong> Registros de acesso, logs e interacciones com agentes de IA.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>3. Finalidades do Tratamento</h4> <ul class='list-disc pl-5 space-y-1'> <li>Gerenciar o controle de acesso e administração.</li> <li>Facilitar a comunicação interna (Residentes, Staff, Admins).</li> <li>Processar pagamentos automatizados via Stripe.</li> <li>Otimizar a gestão operativa através de Inteligência Artificial.</li> </ul> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>4. Transferência de Dados</h4> <p>Seus dados podem ser transferidos a terceiros apenas para a execução de transações financeiras (Stripe), hospedagem em infraestrutura segura (Cloud) ou por exigência de autoridades competentes.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>5. Direitos de Privacidade (LGPD)</h4> <p>Você tem o direito de <strong>Acesso, Rectificação, Cancelamento ou Oposição</strong> ao tratamento de seus dados. Envie sua solicitação para <a href='mailto:legal@vilkor.xyz' class='text-[#34d399] underline'>legal@vilkor.xyz</a> com identificação oficial digitalizada.</p> </section> <section> <h4 class='text-on-background dark:text-white font-bold text-lg mb-3'>6. Consentimento para Uso de IA</h4> <p>Ao utilizar o Vilkor, o usuário consente com o processamento de informações operacionais por modelos de linguagem para gerar resumos, relatórios e automações.</p> </section> </div>"

